name: Nightly test262 Coverage

on:
  schedule:
    # Run every 5 days at 02:00 UTC (1st, 6th, 11th, 16th, 21st, 26th, 31st)
    - cron: "0 2 */5 * *"
  workflow_dispatch: # Allow manual triggers

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@c6d51ded7cde3c421f6cd6046cd601f2248f3710 # cargo-llvm-cov

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Generate coverage from full test262 suite
        run: |
          # shellcheck disable=SC1090 # sourcing dynamic cargo-llvm-cov env export
          source <(cargo llvm-cov show-env --export-prefix)
          cargo llvm-cov clean --workspace
          cargo build --release
          cargo test --release
          uv run python scripts/run-test262.py --jsse ./target/release/jsse --test262 ./test262
          cargo llvm-cov report --release --lcov --output-path lcov.info

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: pmatos/jsse
          flags: nightly-test262
          name: nightly-test262-full
