# zizmor audit configuration.
#
# Most hardening is in the workflows themselves (least-privilege permissions,
# persist-credentials: false on read-only checkouts). The settings below are
# deliberate, documented policy choices.

rules:
  # Actions are pinned to version tags (e.g. @v7), not commit SHAs, for
  # readability and easy review; Dependabot's github-actions updater keeps the
  # tags current. Relax zizmor's default hash-pin requirement to ref-pin so tag
  # pins pass, while still failing on the genuinely dangerous cases: an action
  # pinned to a mutable branch or to no ref at all.
  unpinned-uses:
    config:
      policies:
        "*": ref-pin

  # claude.yml's @claude responder can be asked to implement changes and push a
  # branch; claude-code-action manages its own git credentials, and this job
  # uploads no artifacts, so persisted checkout credentials cannot leak. Leaving
  # checkout auth at its default here avoids breaking the push path. Revisit if
  # the action's auth model changes.
  artipacked:
    ignore:
      - claude.yml
      # release.yml persists checkout credentials so the version-bump commit and
      # tag can be pushed back to main. It uploads only the packaged binary and
      # checksums (no .git), so the token cannot leak via artifacts.
      - release.yml

  # lint-pr-title.yml uses pull_request_target so the check runs with a real
  # GITHUB_TOKEN even on PRs from forks. It never checks out the PR's ref and
  # never executes anything the PR controls: amannn/action-semantic-pull-request
  # only reads the PR title/body via the GitHub API and validates them against
  # the Conventional Commits regex, with permissions scoped to
  # `pull-requests: read`. There is no code-execution or exfiltration path for
  # PR-controlled content to reach the elevated token.
  dangerous-triggers:
    ignore:
      - lint-pr-title.yml

  # commitlint.yml installs @commitlint/cli and @commitlint/config-conventional
  # ad-hoc (pinned to major version @21) rather than via a project lockfile:
  # this repo has no package.json/lockfile of its own (it's a Rust project),
  # so there is nothing for these CI-only tools to lock against. The job only
  # has `contents: read` and never pushes, so a compromised transitive
  # dependency has no credentials to exfiltrate.
  adhoc-packages:
    ignore:
      - commitlint.yml
